<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員註冊 | StudyAbroad Global</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/register.css">
</head>

<body>

    <div class="register-card" data-aos="zoom-in" data-aos-duration="800">
        <div class="mb-4">
            <a href="login.html" class="text-decoration-none text-muted back-link">
                <i class="fa-solid fa-arrow-left me-1"></i> 返回登入
            </a>
        </div>

        <div class="register-logo">
            <i class="fa-solid fa-graduation-cap"></i> <b>STUDYABROAD</b>
            <p class="text-muted fs-6 mt-2">建立您的學員帳戶，開啟留學之路</p>
        </div>

        <form>
            <div class="row g-3">
                <div class="col-md-6 form-floating mb-3">
                    <input type="text" class="form-control" id="realName" placeholder="真實姓名" required>
                    <label for="realName">真實姓名</label>
                </div>
                <div class="col-md-6 form-floating mb-3">
                    <input type="text" class="form-control" id="passportNo" placeholder="護照號碼">
                    <label for="passportNo">護照號碼 (選填)</label>
                </div>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
                <label for="email">電子郵件 (Email)</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="設定密碼" required>
                <label for="password">設定密碼</label>
            </div>

            <button type="submit" class="btn btn-register text-white mt-3">立即註冊</button>

            <div class="text-center mt-4">
                <p class="text-muted small">點擊註冊即代表同意 <a href="#" class="text-primary fw-bold">服務條款</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>

</html>
