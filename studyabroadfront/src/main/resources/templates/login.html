<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員登入 | StudyAbroad Global</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 你的 CSS（Thymeleaf 正確寫法） -->
    <link rel="stylesheet" th:href="@{/login.css}">

</head>

<body>

<div class="login-card" data-aos="zoom-in" data-aos-duration="800">

    <div class="mb-4">
        <a href="/" class="text-decoration-none text-muted back-to-home">
            <i class="fa-solid fa-arrow-left me-1"></i> 返回首頁
        </a>
    </div>

    <div class="login-logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <b>STUDYABROAD</b>
        <p class="text-muted fs-6 mt-2">歡迎回來，開始您的學習之旅</p>
    </div>

    <!-- 🔥 LOGIN FORM -->
    <form onsubmit="login(event)">

        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="email" placeholder="帳號">
            <label for="email">帳號 / Email</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" placeholder="密碼">
            <label for="password">密碼</label>
        </div>

        <div class="d-flex justify-content-between mb-4 small">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label">記住我</label>
            </div>

            <a href="#" class="text-primary text-decoration-none fw-bold">忘記密碼？</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 text-white">
            登入帳戶
        </button>

        <p id="msg" class="text-center mt-3 text-danger"></p>

    </form>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
AOS.init();

/* 🔥 登入 API */
function login(event) {
    event.preventDefault();

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    fetch("/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Login failed");
        }
        return res.json();
    })
    .then(data => {

        console.log("登入成功:", data);

        document.getElementById("msg").innerText = "登入成功：" + data.email;

        // 👉 導頁
        window.location.href = "/home-page";

    })
    .catch(err => {

        console.log(err);

        document.getElementById("msg").innerText = "帳號或密碼錯誤";
    });
}
</script>

</body>
</html>
