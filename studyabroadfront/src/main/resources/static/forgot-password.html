<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 | StudyAbroad Global</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AOS 動畫 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #0d47a1;
            --accent-color: #ff9800;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(rgba(13, 43, 161, 0.7), rgba(13, 71, 161, 0.7)),
                url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .form-floating>.form-control:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }

        .btn-send {
            background: var(--primary-color);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            color: white;
        }

        .btn-send:hover:not(:disabled) {
            background: #093170;
            transform: translateY(-2px);
        }

        .btn-send:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .back-to-login {
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .back-to-login:hover {
            color: var(--primary-color) !important;
        }

        #msg {
            font-size: 0.9rem;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }

        .loading-spinner {
            display: none;
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <div class="login-card" data-aos="zoom-in" data-aos-duration="800">
        
        <div class="mb-4">
            <a href="login.html" class="text-decoration-none text-muted back-to-login">
                <i class="fa-solid fa-arrow-left me-1"></i> 返回登入
            </a>
        </div>

        <div class="login-logo">
            <i class="fa-solid fa-paper-plane"></i>
            <b>FORGOT PASSWORD</b>
            <p class="text-muted fs-6 mt-2">輸入您的 Email，我們將寄送重設連結給您</p>
        </div>

        <!-- 請求表單 -->
        <form id="forgotForm" onsubmit="sendResetEmail(event)">
            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                <label for="email">註冊使用的 Email</label>
            </div>

            <button type="submit" id="submitBtn" class="btn-send">
                <span class="spinner-border spinner-border-sm loading-spinner" id="spinner"></span>
                發送重設郵件
            </button>
        </form>

        <!-- 訊息顯示區 -->
        <div id="msg" style="display: none;"></div>

    </div>

    <!-- JS 庫 -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init();

        function sendResetEmail(event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const msgEl = document.getElementById("msg");
            const btn = document.getElementById("submitBtn");
            const spinner = document.getElementById("spinner");

            // UI 狀態處理
            btn.disabled = true;
            spinner.style.display = "inline-block";
            msgEl.style.display = "none";

            fetch("/api/password/forgot", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                msgEl.style.display = "block";
                msgEl.className = "mt-3 p-2 text-center text-success bg-success bg-opacity-10 border border-success rounded";
                msgEl.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${data.message}`;
                
                // 發送成功後清空欄位
                document.getElementById("email").value = "";
            })
            .catch(err => {
                msgEl.style.display = "block";
                msgEl.className = "mt-3 p-2 text-center text-danger bg-danger bg-opacity-10 border border-danger rounded";
                msgEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> 系統繁忙，請稍後再試`;
            })
            .finally(() => {
                btn.disabled = false;
                spinner.style.display = "none";
            });
        }
    </script>

</body>
