<!DOCTYPE html>
<html lang="zh-TW" ng-app="passwordApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 | StudyAbroad Global</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AOS 動畫 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #0d47a1;
            --accent-color: #ff9800;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(rgba(13, 43, 161, 0.7), rgba(13, 71, 161, 0.7)),
                url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .form-floating>.form-control:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }

        .btn-submit {
            background: var(--primary-color);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: #093170;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .back-to-home {
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .back-to-home:hover {
            color: var(--primary-color) !important;
        }

        .status-msg {
            font-size: 0.9rem;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body ng-controller="PasswordResetController">

    <div class="login-card" data-aos="zoom-in" data-aos-duration="800">
        
        <div class="mb-4">
       		 <a href="login.html" target="_self" class="text-decoration-none text-muted back-to-home">
    			<i class="fa-solid fa-arrow-left me-1"></i> 返回登入
			 </a>            
        </div>

        <div class="login-logo">
            <i class="fa-solid fa-key"></i>
            <b>RESET PASSWORD</b>
            <p class="text-muted fs-6 mt-2" ng-if="!isSuccess">請設定您的新密碼以確保帳戶安全</p>
        </div>

        <!-- 只有在未成功時顯示表單 -->
        <div ng-if="!isSuccess">
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="newPassword" 
                       ng-model="resetData.newPassword" placeholder="新密碼">
                <label for="newPassword">新密碼</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="confirmPassword" 
                       ng-model="confirmPassword" placeholder="確認新密碼">
                <label for="confirmPassword">確認新密碼</label>
            </div>

            <button class="btn-submit" ng-click="submitReset()" 
                    ng-disabled="!resetData.newPassword || resetData.newPassword !== confirmPassword || !resetData.token">
                <i class="fa-solid fa-check-circle me-1"></i> 確認修改密碼
            </button>

            <!-- 錯誤訊息 -->
            <div class="status-msg text-danger" ng-if="errorMessage">
                <i class="fa-solid fa-circle-exclamation"></i> {{errorMessage}}
            </div>
            <div class="status-msg text-warning" ng-if="resetData.newPassword !== confirmPassword && confirmPassword">
                密碼輸入不一致
            </div>
        </div>

        <!-- 成功後的顯示畫面 -->
        <div ng-if="isSuccess" class="text-center py-4" data-aos="fade-up">
            <i class="fa-solid fa-circle-check text-success mb-3" style="font-size: 4rem;"></i>
            <h4 class="text-success fw-bold">修改成功！</h4>
            <p class="text-muted">{{successMessage}}</p>
            <a href="login.html" target="_self" class="btn btn-outline-primary mt-3 px-4">前往登入</a>
        </div>

    </div>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <!-- JS 庫 -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init();

        var app = angular.module('passwordApp', []);

        // 配置讓 AngularJS 讀取 URL 參數
        app.config(['$locationProvider', function($locationProvider) {
            $locationProvider.html5Mode({
                enabled: true,
                requireBase: false
            });
        }]);

        app.controller('PasswordResetController', function($scope, $http, $location) {
            $scope.resetData = {
                token: '',
                newPassword: ''
            };
            $scope.isSuccess = false;
            $scope.errorMessage = '';

            // 1. 從 URL 抓取 token
            $scope.resetData.token = $location.search().token;

            if (!$scope.resetData.token) {
                $scope.errorMessage = "驗證碼遺失，請重新申請重設信件。";
            }

            // 2. 提交 API
            $scope.submitReset = function() {
                $scope.errorMessage = '';
                
                $http.post('/api/password/reset', $scope.resetData)
                    .then(function(response) {
                        $scope.isSuccess = true;
                        $scope.successMessage = "您的密碼已成功更新。";
                    })
                    .catch(function(error) {
                        $scope.errorMessage = (error.data && error.data.error) ? error.data.error : "重設失敗，連結可能已過期。";
                    });
            };
        });
    </script>

</body>
</html>
