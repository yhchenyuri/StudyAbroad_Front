<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | StudyAbroad Global</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/contact.css">


</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fa-solid fa-graduation-cap me-2 text-accent"></i>STUDY<span
                    class="text-white-50">ABROAD</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">精選課程</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">聯絡我們</a></li>
                    <li class="nav-item mt-2 mt-lg-0">
                        <a class="btn btn-login ms-lg-3" href="login.html">學員登入 <i
                                class="fa-solid fa-arrow-right-to-bracket ms-1"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="contact-header text-center">
        <div class="container" data-aos="fade-down">
            <h1 class="display-5 fw-bold">讓我們助您一臂之力</h1>
            <p class="lead opacity-75">對留學有任何疑問？請留下您的聯絡資訊，我們將儘速安排專業顧問與您洽談。</p>
        </div>
    </header>

    <main class="container mb-5" style="margin-top: -30px;">
        <div class="row contact-card g-0" data-aos="fade-up">
            <div class="col-lg-4 info-sidebar">
                <h4 class="fw-bold mb-4">聯絡資訊</h4>
                <div class="d-flex mb-4">
                    <i class="fa-solid fa-location-dot mt-1 me-3 fs-5"></i>
                    <p class="mb-0">台北市信義區忠孝東路五段 123 號 10 樓</p>
                </div>
                <div class="d-flex mb-4">
                    <i class="fa-solid fa-phone mt-1 me-3 fs-5"></i>
                    <p class="mb-0">02-1234-5678</p>
                </div>
                <div class="d-flex mb-4">
                    <i class="fa-solid fa-envelope mt-1 me-3 fs-5"></i>
                    <p class="mb-0">info@studyabroad.com</p>
                </div>
                <div class="mt-5">
                    <h5 class="fw-bold">追蹤我們</h5>
                    <div class="d-flex gap-3 fs-4 mt-3">
                        <a href="#" class="text-white opacity-75"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class="text-white opacity-75"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="text-white opacity-75"><i class="fa-brands fa-line"></i></a>
                    </div>
                </div>
            </div>

            <div class="col-lg-8 p-4 p-md-5">
                <form id="contactForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">姓名</label>
                            <input type="text" class="form-control" placeholder="請輸入姓名" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">連絡電話 (手機)</label>
                            <input type="tel" class="form-control" placeholder="09XX-XXX-XXX" required>
                        </div>
                        <div class="col-12 mt-3">
                            <label class="form-label fw-bold">電子郵件</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="col-12 mt-3">
                            <label class="form-label fw-bold">需求說明</label>
                            <textarea class="form-control" rows="4" placeholder="請寫下您的留學目標或疑問..."></textarea>
                        </div>
                        <div class="col-12 mt-4 d-flex gap-3">
                            <button type="reset" class="btn btn-outline-secondary btn-clear">清除內容</button>
                            <button type="submit" class="btn btn-submit flex-fill">提交申請</button>

                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4 border-0">
                <div class="text-success mb-3"><i class="fa-solid fa-circle-check display-1"></i></div>
                <h3 class="fw-bold">提交成功！</h3>
                <p class="text-muted">您的留學需求我們已經收到，顧問將在 24 小時內聯絡您。</p>
                <button type="button" class="btn btn-primary rounded-pill px-5 mx-auto mt-3"
                    data-bs-dismiss="modal">知道了</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // 提交表單邏輯
        document.getElementById('contactForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // 觸發 Bootstrap Modal
            var myModal = new bootstrap.Modal(document.getElementById('successModal'));
            myModal.show();
            this.reset();
        });
    </script>
</body>

</html>
