<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學員登入 | StudyAbroad Global</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!--    <link rel="stylesheet" href="../static/login.css">-->
    <link rel="stylesheet" th:href="@{/login.css}">

</head>

<body>

    <div class="login-card" data-aos="zoom-in" data-aos-duration="800">
        <div class="mb-4">
            <a href="index.html" class="text-decoration-none text-muted back-to-home">
                <i class="fa-solid fa-arrow-left me-1"></i> 返回首頁
            </a>
        </div>

        <div class="login-logo">
            <i class="fa-solid fa-graduation-cap"></i> <b>STUDYABROAD</b>
            <p class="text-muted fs-6 mt-2">歡迎回來，開始您的學習之旅</p>
        </div>

        <form>
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="帳號">
                <label for="username">帳號 / Email</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="密碼">
                <label for="password">密碼</label>
            </div>

            <div class="d-flex justify-content-between mb-4 small">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">記住我</label>
                </div>
                <a href="#" class="text-primary text-decoration-none fw-bold">忘記密碼？</a>
            </div>

            <button type="submit" class="btn btn-login text-white">登入帳戶</button>

            <div class="text-center mt-4">
                <p class="text-muted small">還沒有帳號嗎？ <a href="/register"
                        class="text-primary fw-bold text-decoration-none">立即註冊</a></p>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>

</html>
